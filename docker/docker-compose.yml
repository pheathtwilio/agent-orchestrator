# Infrastructure for agent orchestrator.
# Agent containers are created dynamically by the runtime-docker plugin,
# not defined here. This only runs the supporting services.
version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: ao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - ao-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  ao-network:
    name: ao-network
    driver: bridge

volumes:
  redis-data:
